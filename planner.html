<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#fff8fb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="REPOSE" />
  <title>REPOSE — Healing Outfit × Crystal Planner</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    :root{
      --ink:#1f2230;
      --muted:rgba(31,34,48,.68);
      --faint:rgba(31,34,48,.52);
      --bg0:#fff8fb;
      --bg1:#f6f2ff;
      --pink:#ffd6e8;
      --lav:#cfc3ff;
      --mint:#c9ffe9;
      --sky:#bfeaff;
      --glass:rgba(255,255,255,.60);
      --glass2:rgba(255,255,255,.42);
      --line:rgba(31,34,48,.10);
      --line2:rgba(31,34,48,.14);
      --shadow: 0 16px 42px rgba(31,34,48,.10);
      --shadow2: 0 10px 28px rgba(31,34,48,.08);
      --r:18px;
      --r2:24px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "PingFang SC", "Noto Sans CJK SC", Arial;
      color:var(--ink);
      background:
        radial-gradient(900px 640px at 12% 0%, rgba(255,214,232,.75), transparent 60%),
        radial-gradient(820px 620px at 88% 6%, rgba(191,234,255,.55), transparent 58%),
        radial-gradient(760px 640px at 70% 110%, rgba(201,255,233,.44), transparent 55%),
        radial-gradient(820px 680px at 24% 110%, rgba(207,195,255,.42), transparent 58%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow-x:hidden;
    }
    .grain{
      pointer-events:none;
      position:fixed; inset:0;
      opacity:.22;
      background-image:
        radial-gradient(1px 1px at 10% 18%, rgba(31,34,48,.28), transparent 60%),
        radial-gradient(1px 1px at 44% 12%, rgba(31,34,48,.22), transparent 60%),
        radial-gradient(1px 1px at 78% 24%, rgba(31,34,48,.18), transparent 60%),
        radial-gradient(1px 1px at 32% 62%, rgba(31,34,48,.16), transparent 60%),
        radial-gradient(1px 1px at 62% 72%, rgba(31,34,48,.14), transparent 60%),
        radial-gradient(1px 1px at 88% 78%, rgba(31,34,48,.12), transparent 60%);
      filter: blur(.2px);
    }
    .wrap{ max-width: 420px; margin: 0 auto; padding: 14px 12px 28px; }
    .top{
      display:flex; flex-direction: column; gap: 10px;
      padding: 12px 14px;
      border-radius: var(--r2);
      background: linear-gradient(180deg, var(--glass), var(--glass2));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .btn{
      border: 1px solid var(--line2);
      background: rgba(255,255,255,.55);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--ink);
      cursor:pointer;
      box-shadow: var(--shadow2);
      transition: transform .12s ease, border-color .18s ease;
      user-select:none;
      white-space:nowrap;
    }
    .btn:hover{ transform: translateY(-1px); border-color: rgba(31,34,48,.18); }
    .btn.primary{
      background: linear-gradient(180deg, rgba(255,214,232,.75), rgba(255,255,255,.55));
      border-color: rgba(31,34,48,.14);
    }
    .topBar{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px; flex-wrap:wrap; }
    .navLinks{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .seg{ display:flex; border:1px solid rgba(31,34,48,.1); background:rgba(255,255,255,.35); border-radius:999px; padding:4px; gap:4px; }
    .seg button{ border:0; background:transparent; padding:8px 14px; border-radius:999px; font-size:14px; color:var(--muted); cursor:pointer; transition:all .16s ease; outline:none; user-select:none; font-family:inherit; }
    .seg button:hover{ color:var(--ink); }
    .seg button[aria-pressed="true"]{ background:var(--ink); color:#fff; }
    .backLink{
      display:inline-flex; align-items:center; gap:6px;
      padding:6px 0;
      font-size:12px; color:var(--muted); text-decoration:none;
    }
    .backLink:hover{ color:var(--ink); }
    button.backLink{ background:none; border:none; cursor:pointer; font-family:inherit; }
    .brandRow{ display:flex; align-items:center; gap:12px; }
    .puffyWrap{
      width: 48px; height: 48px; flex-shrink: 0;
      animation: puffyJump 3s ease-in-out infinite;
    }
    .puffyWrap svg{ width:100%; height:100%; display:block; filter: drop-shadow(0 2px 8px rgba(207,195,255,.25)); }
    @keyframes puffyJump {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .brandRow .name{ margin:0; font-size:18px; font-weight: 860; letter-spacing: .3px; }
    .grid{ margin-top: 14px; display: flex; flex-direction: column; gap: 14px; }
    .card{
      border-radius: var(--r2);
      border:1px solid var(--line);
      background:
        radial-gradient(700px 320px at 18% 0%, rgba(255,214,232,.44), transparent 60%),
        radial-gradient(820px 360px at 92% 10%, rgba(191,234,255,.34), transparent 56%),
        linear-gradient(180deg, var(--glass), var(--glass2));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow:hidden;
    }
    .pad{ padding: 14px; }
    .sectionTitle{ display:flex; align-items:baseline; justify-content:space-between; gap: 10px; }
    .sectionTitle h2{ margin:0; font-size: 13px; font-weight: 880; letter-spacing:.2px; }
    .sectionTitle p{ margin:0; font-size: 11px; color: var(--muted); }
    .hero{
      padding: 18px 16px 16px;
      background:
        radial-gradient(520px 220px at 18% 30%, rgba(255,214,232,.52), transparent 62%),
        radial-gradient(620px 280px at 85% 30%, rgba(191,234,255,.36), transparent 60%),
        radial-gradient(720px 360px at 60% 115%, rgba(201,255,233,.28), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.70), rgba(255,255,255,.38));
      border-bottom: 1px solid rgba(31,34,48,.08);
    }
    .hero h1{ margin:0; font-size: 22px; font-weight: 920; letter-spacing: .2px; line-height: 1.15; }
    .hero .slogan{ margin-top: 8px; font-size: 13px; color: var(--muted); line-height: 1.55; max-width: 62ch; }
    .hero .slogan b{ color: var(--ink); }
    .hero .chips{ margin-top: 12px; display:flex; gap:8px; flex-wrap: wrap; }
    .chip{
      border: 1px solid rgba(31,34,48,.10);
      background: rgba(255,255,255,.55);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      color: var(--muted);
    }
    .planner{ display: flex; flex-direction: column; gap: 12px; padding: 14px; }
    .mini{
      border-radius: 18px;
      border: 1px solid rgba(31,34,48,.10);
      background: rgba(255,255,255,.46);
      padding: 12px;
    }
    .mini .k{ font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .2px;}
    .mini .v{ margin-top: 6px; font-size: 13px; color: var(--ink); font-weight: 820; }
    .mini .d{ margin-top: 6px; font-size: 12px; color: var(--muted); line-height: 1.55; }
    .bar{ height: 8px; border-radius: 999px; border: 1px solid rgba(31,34,48,.10); background: rgba(255,255,255,.55); overflow:hidden; margin-top: 10px; }
    .fill{ height:100%; background: linear-gradient(90deg, rgba(255,214,232,.95), rgba(207,195,255,.80), rgba(201,255,233,.80)); width: 55%; }
    .recoList{ padding: 0 14px 14px; display:grid; gap: 10px; }
    .reco{ border-radius: 20px; border: 1px solid rgba(31,34,48,.10); background: rgba(255,255,255,.52); overflow:hidden; }
    .recoTop{ display:flex; flex-wrap: wrap; justify-content:space-between; align-items:flex-start; gap: 8px; padding: 10px 12px; border-bottom: 1px solid rgba(31,34,48,.08); }
    .recoTop .left{ display:flex; align-items:center; gap:10px; min-width: 0; flex: 1 1 auto; }
    .badge{
      width: 34px; height: 34px; border-radius: 14px;
      border: 1px solid rgba(31,34,48,.10);
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.85), rgba(255,255,255,.35) 50%, transparent 70%), rgba(255,255,255,.50);
      box-shadow: 0 0 18px rgba(207,195,255,.22);
      display:flex; align-items:center; justify-content:center;
      font-weight: 900; color: rgba(31,34,48,.78); flex:0 0 auto;
    }
    .title{ min-width: 0; }
    .title .t{ font-size: 12.5px; font-weight: 900; color: var(--ink); overflow:hidden; text-overflow:ellipsis; }
    .title .m{ margin-top: 2px; font-size: 11px; color: var(--muted); line-height: 1.35; word-break: break-word; }
    .tag{ border: 1px solid rgba(31,34,48,.10); background: rgba(255,255,255,.55); border-radius: 999px; padding: 6px 10px; font-size: 11px; color: var(--muted); white-space:nowrap; }
    .recoBody{ padding: 10px 12px 12px; display:grid; gap: 8px; }
    .line{ font-size: 12px; color: var(--muted); line-height: 1.55; }
    .line b{ color: var(--ink); font-weight: 850; }
    .actions{ display:flex; gap: 8px; flex-wrap: wrap; align-items:center; justify-content:space-between; margin-top: 2px; }
    .actions .left{ display:flex; gap:8px; flex-wrap: wrap; }
    .btnMini{
      border: 1px solid rgba(31,34,48,.12);
      background: rgba(255,255,255,.58);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 12px;
      color: var(--ink);
      cursor:pointer;
      transition: transform .12s ease, border-color .18s ease;
      user-select:none;
    }
    .btnMini:hover{ transform: translateY(-1px); border-color: rgba(31,34,48,.18); }
    .profile{ padding: 0 14px 14px; display:grid; gap: 10px; }
    .profile .row{ display: flex; flex-direction: column; gap: 10px; }
    .metric{
      flex: none;
      border-radius: 18px;
      border: 1px solid rgba(31,34,48,.10);
      background: rgba(255,255,255,.50);
      padding: 12px;
    }
    .metric .k{ font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .2px; }
    .metric .v{ margin-top: 6px; font-size: 12.5px; color: var(--ink); line-height: 1.45; }
    .metric .v span{ color: var(--muted); }
    .modalBack{
      position: fixed; inset:0;
      background: rgba(31,34,48,.28);
      display:none; align-items:center; justify-content:center;
      padding: 16px; z-index: 99;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .modal{
      width: min(860px, 96vw);
      border-radius: 26px;
      border: 1px solid rgba(31,34,48,.12);
      background: linear-gradient(180deg, rgba(255,255,255,.70), rgba(255,255,255,.42));
      box-shadow: 0 24px 70px rgba(31,34,48,.18);
      overflow:hidden;
    }
    .modalTop{ display:flex; justify-content:space-between; align-items:center; padding: 12px 14px; border-bottom: 1px solid rgba(31,34,48,.10); }
    .close{ border: 1px solid rgba(31,34,48,.12); background: rgba(255,255,255,.60); border-radius: 12px; padding: 8px 10px; cursor:pointer; font-size: 12px; color: var(--ink); }
    .modalHero{
      padding: 16px 14px;
      background: radial-gradient(520px 220px at 18% 25%, rgba(255,214,232,.55), transparent 62%), radial-gradient(620px 280px at 88% 30%, rgba(191,234,255,.36), transparent 60%), linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,.40));
      border-bottom: 1px solid rgba(31,34,48,.08);
    }
    .modalHero h3{ margin:0; font-size: 16px; font-weight: 920; letter-spacing:.2px; }
    .modalHero p{ margin: 8px 0 0; font-size: 12.5px; color: var(--muted); line-height: 1.55; max-width: 72ch; }
    .modalBody{ padding: 14px; display:grid; gap: 10px; }
    .kv{ display:grid; grid-template-columns: 100px 1fr; gap: 10px; border-radius: 18px; border: 1px solid rgba(31,34,48,.10); background: rgba(255,255,255,.55); padding: 12px; }
    .kv .k{ font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing:.2px; }
    .kv .v{ font-size: 12.5px; color: var(--ink); line-height: 1.55; white-space: pre-wrap; }
    .footerNote{ margin-top: 10px; font-size: 11px; color: var(--faint); line-height: 1.6; }
    .energyCardSummary{ padding: 14px; border-bottom: 1px solid rgba(31,34,48,.08); }
    .energyCardSummary h2{ margin: 0 0 12px; font-size: 13px; font-weight: 880; letter-spacing: .2px; }
    .energyCardSummary .cardRow{ margin-top: 12px; }
    .energyCardSummary .cardRow:first-of-type{ margin-top: 0; }
    .energyCardSummary .cardRow .rowLabel{ font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 4px; }
    .energyCardSummary .cardRow .rowValue{ font-size: 13px; color: var(--ink); font-weight: 600; line-height: 1.4; }
    .energyCardSummary .outfitSlots{ display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .energyCardSummary .outfitSlot{ display: inline-flex; align-items: center; gap: 4px; border-radius: 10px; padding: 6px 10px; font-size: 11px; background: rgba(255,255,255,.6); border: 1px solid rgba(31,34,48,.08); color: var(--ink); }
    .energyCardSummary .outfitSlot .slotK{ color: var(--muted); font-weight: 600; }
    .energyCardSummary .paletteRow{ display: flex; align-items: center; gap: 10px; margin-top: 4px; flex-wrap: wrap; }
    .energyCardSummary .paletteDots{ display: flex; gap: 6px; align-items: center; }
    .energyCardSummary .paletteDot{ width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(31,34,48,.12); flex-shrink: 0; }
    .energyCardSummary .paletteMaterial{ font-size: 12px; color: var(--muted); }
    .energyCardSummary .anchorRow .rowValue{ font-style: italic; font-weight: 650; }
    .energyCardSummary .detailsFold{ margin-top: 14px; border-top: 1px solid rgba(31,34,48,.08); padding-top: 12px; }
    .energyCardSummary .detailsFold.collapsed .detailsContent{ display: none; }
    .energyCardSummary .viewDetailsBtn{ background: none; border: 0; padding: 0; font-size: 12px; font-weight: 700; color: var(--ink); cursor: pointer; text-decoration: none; font-family: inherit; }
    .energyCardSummary .viewDetailsBtn:hover{ text-decoration: underline; }
    .energyCardSummary .detailsContent{ margin-top: 10px; font-size: 12px; color: var(--muted); line-height: 1.55; }
    .energyCardSummary .pillsWrap{ display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .energyCardSummary .pillSmall,
    .metric .pillSmall{ border-radius: 999px; padding: 4px 8px; font-size: 11px; background: rgba(255,255,255,.55); border: 1px solid rgba(31,34,48,.10); color: var(--ink); }
    .energyCardSummary .row{ margin-top: 8px; font-size: 12px; line-height: 1.5; }
    .energyCardSummary .row .k{ color: var(--muted); }
    .energyCardSummary .row .v{ color: var(--ink); font-weight: 600; }
    .energyCardSummary .cta{ margin-top: 12px; }
    .energyCardSummary .cta a{ font-size: 12px; color: var(--ink); font-weight: 700; }
    .todayPlanWrap{ padding: 14px; }
    .todayPlanWrap h2{ margin: 0 0 10px; font-size: 13px; font-weight: 880; }
    .todoForm{ display:flex; gap: 8px; margin-bottom: 12px; }
    .todoForm input{ flex:1; border: 1px solid var(--line); background: rgba(255,255,255,.55); border-radius: 12px; padding: 10px 12px; font-size: 13px; color: var(--ink); outline: none; }
    .todoForm .btn{ flex: 0 0 auto; }
    .todoList{ list-style: none; margin: 0; padding: 0; }
    .todoItem{ display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(31,34,48,.08); font-size: 14px; }
    .todoItem:last-child{ border-bottom: 0; }
    .todoItem input[type=checkbox]{ width: 20px; height: 20px; accent-color: var(--ink); cursor: pointer; }
    .todoItem.done .todoText{ text-decoration: line-through; color: var(--muted); }
    .todoItem .todoText{ flex: 1; }
    .todoItem .todoDel{ background: none; border: 0; padding: 4px; cursor: pointer; color: var(--muted); font-size: 12px; }
    .todoItem .todoDel:hover{ color: var(--ink); }

    .puffyOutfitWrap{
      margin-top: 18px;
      padding: 14px;
      border-radius: 20px;
      border: 1px solid rgba(31,34,48,.08);
      background: rgba(255,255,255,.35);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .puffyOutfitWrap .puffyOutfitSvg{
      width: 88px;
      height: 80px;
      flex-shrink: 0;
      position: relative;
      animation: puffyFloat 4s ease-in-out infinite;
    }
    .puffyOutfitWrap .puffyOutfitSvg svg{ width: 100%; height: 100%; display: block; }
    @keyframes puffyFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    .puffyOutfitCaption{
      font-size: 11px;
      color: var(--muted);
      line-height: 1.45;
      text-align: center;
      max-width: 100%;
    }
    .puffyOutfitCaption b{ color: var(--ink); font-weight: 800; }
    .puffyOutfitWrap[role="button"]:hover{
      background: rgba(255,255,255,.52);
      border-color: rgba(31,34,48,.12);
    }

    @media (min-width: 768px) {
      .wrap{ max-width: 1100px; padding: 18px 16px 28px; }
      .grid{ display: grid; grid-template-columns: 1.2fr .8fr; gap: 14px; }
      .profile .row{ flex-direction: row; flex-wrap: wrap; }
      .metric{ flex: 1 1 220px; }
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="wrap">
    <div class="topBar">
      <div class="navLinks">
        <a href="index.html" class="backLink" id="navBackHome">返回首页</a>
        <a href="result.html" class="backLink" id="navBackResult">返回能量卡</a>
        <button type="button" class="backLink" id="openConceptBtn">概念卡</button>
      </div>
      <div class="seg" role="group" aria-label="Language">
        <button type="button" id="langEN" aria-pressed="false">EN</button>
        <button type="button" id="langZH" aria-pressed="true">中文</button>
      </div>
    </div>
    <header class="top">
      <div class="brandRow">
        <div class="puffyWrap" aria-hidden="true">
          <svg viewBox="0 0 100 90" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="cloudGradPlanner" x1="50%" y1="0%" x2="50%" y2="100%">
                <stop offset="0%" stop-color="rgba(255,255,255,0.94)" />
                <stop offset="50%" stop-color="rgba(255,250,254,0.82)" />
                <stop offset="100%" stop-color="rgba(248,240,255,0.68)" />
              </linearGradient>
              <linearGradient id="cloudEdgePlanner" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="rgba(255,255,255,0.48)" />
                <stop offset="100%" stop-color="rgba(218,208,235,0.35)" />
              </linearGradient>
            </defs>
            <path d="M50 12 C74 12 88 26 88 40 C88 46 84 50 78 52 C82 54 86 60 86 66 C86 76 70 84 50 84 C30 84 14 76 14 66 C14 60 18 54 22 52 C16 50 12 46 12 40 C12 26 26 12 50 12 Z" fill="url(#cloudGradPlanner)" stroke="url(#cloudEdgePlanner)" stroke-width="0.95" stroke-linejoin="round" />
            <ellipse cx="36" cy="32" rx="3.8" ry="5" fill="rgba(40,36,62,0.88)" transform="rotate(-8 36 32)" />
            <circle cx="37" cy="30.8" r="1.2" fill="rgba(255,255,255,0.98)" />
            <ellipse cx="64" cy="32" rx="3.8" ry="5" fill="rgba(40,36,62,0.88)" transform="rotate(8 64 32)" />
            <circle cx="63" cy="30.8" r="1.2" fill="rgba(255,255,255,0.98)" />
            <path d="M44 41 Q50 49 56 41" stroke="rgba(55,48,68,0.6)" stroke-width="0.95" fill="none" stroke-linecap="round" />
          </svg>
        </div>
        <div class="name">REPOSE</div>
      </div>
    </header>
    <div class="grid">
      <section class="card">
        <div class="energyCardSummary" id="energyCardBlock" style="display:none">
          <h2 id="energyCardTitle">你的能量卡</h2>
          <div class="cardRow" id="energyRowCrystal">
            <div class="rowLabel" id="energyCrystalLabel">Crystal</div>
            <div class="rowValue" id="energyCardCrystal"></div>
          </div>
          <div class="cardRow" id="energyRowOutfit">
            <div class="rowLabel" id="energyOutfitLabel">Outfit</div>
            <div class="outfitSlots" id="energyOutfitSlots"></div>
          </div>
          <div class="cardRow" id="energyRowPalette">
            <div class="rowLabel" id="energyPaletteLabel">Palette</div>
            <div class="paletteRow">
              <div class="paletteDots" id="energyPaletteDots"></div>
              <span class="paletteMaterial" id="energyPaletteMaterial"></span>
            </div>
          </div>
          <div class="cardRow anchorRow" id="energyRowAnchor">
            <div class="rowLabel" id="energyAnchorLabel">Anchor</div>
            <div class="rowValue" id="energyCardAnchor"></div>
          </div>
          <div class="detailsFold collapsed" id="energyDetailsFold">
            <button type="button" class="viewDetailsBtn" id="energyViewDetailsBtn">View details</button>
            <div class="detailsContent" id="energyDetailsContent"></div>
          </div>
        </div>
        <div class="energyCardSummary" id="energyCardEmpty" style="display:none">
          <h2 id="energyCardEmptyTitle">你的能量卡</h2>
          <p id="energyCardEmptyDesc" style="margin:0 0 10px; font-size:12px; color: var(--muted); line-height:1.5">完成测验并查看能量卡后，此处将显示你的专属摘要。</p>
          <div class="cta" style="display:flex; gap:10px; flex-wrap:wrap;"><a href="quiz.html" id="energyQuizLink">去测验</a><a href="result.html" id="energyResultLink">查看能量卡</a></div>
        </div>
        <div class="todayPlanWrap">

  const profileRow = document.getElementById("profileRow");
  function labelStyle(s){ if (s == null || s === undefined) return ""; var map = {officecore:"Office Core / 写字楼感", cleangirl:"Clean Girl / 清冷干净", softgirl:"Soft Girl / 软糯温柔", y2k:"Y2K / 闪闪Y2K"}; var lang = getLang(); if (lang === "zh") { var mapZh = {officecore:"写字楼感", cleangirl:"清冷干净", softgirl:"软糯温柔", y2k:"闪闪Y2K"}; return mapZh[s] || map[s] || String(s); } return (map[s] || String(s)).split(" / ")[0] || String(s); }
  function labelPalette(p){ if (p == null || p === undefined) return ""; var map = {pink:"Pink / 粉", lavender:"Lavender / 紫", mint:"Mint / 薄荷", iceblue:"Ice Blue / 冰蓝", white:"White / 白", blackgold:"Black-Gold / 黑金"}; var lang = getLang(); if (lang === "zh") { var mapZh = {pink:"粉", lavender:"紫", mint:"薄荷", iceblue:"冰蓝", white:"白", blackgold:"黑金"}; return mapZh[p] || map[p] || String(p); } return (map[p] || String(p)).split(" / ")[0] || String(p); }
  function moodLabel(m){ const map = {calm:"Calm / 平静", joy:"Joy / 愉悦", focus:"Focus / 专注", dreamy:"Dreamy / 梦幻"}; return map[m] || m; }
  function weatherLabel(w){ const map = {sunny:"Sunny / 晴", cloudy:"Cloudy / 阴", rainy:"Rainy / 雨", windy:"Windy / 风", cold:"Cold / 冷"}; return map[w] || w; }
  function score(t, mood, weather){ const sw = prefs.style[t.style] ?? 0; const pw = prefs.palette[t.palette] ?? 0; const moodMatch = (t.mood === mood) ? 0.55 : 0; const weatherMatch = (t.weather.includes(weather)) ? 0.35 : 0; const eps = Math.random()*0.02; return (1.2*sw) + (1.0*pw) + moodMatch + weatherMatch + eps; }
  function pickTop(mood, weather, n){ return templates.map(t => ({...t, _score: score(t, mood, weather)})).sort((a,b)=>b._score-a._score).slice(0, n || 2); }
  function applyFeedback(t, dir){ const step = (dir > 0) ? 0.18 : -0.18; prefs.style[t.style] = (prefs.style[t.style] ?? 0) + step; prefs.palette[t.palette] = (prefs.palette[t.palette] ?? 0) + step; Object.keys(prefs.style).forEach(k => { if(k !== t.style) prefs.style[k] *= 0.985; }); Object.keys(prefs.palette).forEach(k => { if(k !== t.palette) prefs.palette[k] *= 0.985; }); if(dir > 0) prefs.meta.saves += 1; else prefs.meta.skips += 1; savePrefs(prefs); }
  function topK(obj, k=2){ return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,k); }
  function normalize(valuesObj){ const vals = Object.values(valuesObj); const min = Math.min(...vals); const max = Math.max(...vals); const denom = (max-min) || 1; const out = {}; Object.entries(valuesObj).forEach(([k,v])=> out[k] = (v-min)/denom); return out; }
  function clamp01(x){ return Math.max(0, Math.min(1, x)); }
  function renderProfile(){
    var L = PLANNER_I18N[getLang()] || PLANNER_I18N.en;
    profileRow.innerHTML = "";
    const styleTop = topK(prefs.style, 2);
    const palTop = topK(prefs.palette, 2);
    const styleNorm = normalize(prefs.style);
    const palNorm = normalize(prefs.palette);
    const m1 = document.createElement("div"); m1.className = "metric"; m1.innerHTML = `<div class="k">${L.topStyle}</div><div class="v"><b>${labelStyle(styleTop[0][0])}</b><br/><span>${labelStyle(styleTop[1][0])}</span></div><div class="bar"><div class="fill" style="width:${Math.round(clamp01(styleNorm[styleTop[0][0]])*100)}%"></div></div>`;
    const m2 = document.createElement("div"); m2.className = "metric"; m2.innerHTML = `<div class="k">${L.topPalette}</div><div class="v"><b>${labelPalette(palTop[0][0])}</b><br/><span>${labelPalette(palTop[1][0])}</span></div><div class="bar"><div class="fill" style="width:${Math.round(clamp01(palNorm[palTop[0][0]])*100)}%"></div></div>`;
    const m3 = document.createElement("div"); m3.className = "metric"; m3.innerHTML = `<div class="k">${L.signals}</div><div class="v"><b>${L.saves}</b> ${prefs.meta.saves} · <b>${L.skips}</b> ${prefs.meta.skips}<br/><span>${L.signalsNote}</span></div>`;
    profileRow.appendChild(m1); profileRow.appendChild(m2); profileRow.appendChild(m3);
  }
  function renderRecos(){
    var L = PLANNER_I18N[getLang()] || PLANNER_I18N.en;
    recoList.innerHTML = "";
    var mw = getMoodWeatherFromResult();
    const top = pickTop(mw.mood, mw.weather, 2);
    top.forEach((t, idx) => {
      const el = document.createElement("div");
      el.className = "reco";
      el.innerHTML = `<div class="recoTop"><div class="left"><div class="badge">${idx+1}</div><div class="title"><div class="t">${t.title}</div><div class="m">${labelStyle(t.style)} · ${labelPalette(t.palette)}</div></div></div></div><div class="recoBody"><div class="line"><b>${L.crystal}</b>${t.crystal}</div><div class="line"><b>${L.outfit}</b>${t.outfit}</div><div class="actions"><div class="left"><button class="btnMini" data-save="1">${L.save}</button><button class="btnMini" data-skip="1">${L.skip}</button></div><button class="btnMini" data-open="1">${L.openCard}</button></div></div>`;
      el.querySelector('[data-save="1"]').addEventListener("click", function(){ applyFeedback(t, +1); renderProfile(); renderRecos(); });
      el.querySelector('[data-skip="1"]').addEventListener("click", function(){ applyFeedback(t, -1); renderProfile(); renderRecos(); });
      el.querySelector('[data-open="1"]').addEventListener("click", function(){ openConceptModal(); });
      recoList.appendChild(el);
    });
  }
  const modalBack = document.getElementById("modalBack");
  const closeBtn = document.getElementById("closeBtn");
  function openConceptModal(){
    var L = PLANNER_I18N[getLang()] || PLANNER_I18N.en;
    document.getElementById("mCrystal").textContent = L.mCrystal;
    document.getElementById("mOutfit").textContent = L.mOutfit;
    modalBack.style.display = "flex";
  }
  function closeModal(){ modalBack.style.display = "none"; }
  document.getElementById("langEN").addEventListener("click", function(e){ e.preventDefault(); setLang("en"); });
  document.getElementById("langZH").addEventListener("click", function(e){ e.preventDefault(); setLang("zh"); });
  closeBtn.addEventListener("click", closeModal);
  modalBack.addEventListener("click", function(e){ if(e.target === modalBack) closeModal(); });
  window.addEventListener("keydown", function(e){ if(e.key === "Escape") closeModal(); });
  document.getElementById("openConceptBtn").addEventListener("click", openConceptModal);
  document.getElementById("refreshPrefsBtn").addEventListener("click", function(){
    prefs = defaultPrefs();
    savePrefs(prefs);
    renderProfile();
    renderRecos();
  });

  var TODOS_KEY = "repose.planner.todos";
  function loadTodos(){ try{ var r = localStorage.getItem(TODOS_KEY); if(!r) return []; var a = JSON.parse(r); return Array.isArray(a) ? a : []; }catch(e){ return []; } }
  function saveTodos(todos){ try{ localStorage.setItem(TODOS_KEY, JSON.stringify(todos)); }catch(e){} }
  function renderTodos(){
    var todos = loadTodos();
    var list = document.getElementById("todoList");
    var fill = document.getElementById("energyFill");
    if(!list) return;
    list.innerHTML = "";
    var done = 0;
    var delLabel = (PLANNER_I18N[getLang()] || PLANNER_I18N.en).delete;
    todos.forEach(function(item, i){
      var li = document.createElement("li");
      li.className = "todoItem" + (item.done ? " done" : "");
      li.innerHTML = "<input type=\"checkbox\" " + (item.done ? "checked" : "") + " data-i=\"" + i + "\" /><span class=\"todoText\">" + (item.text || "").replace(/[&<>"']/g, function(m){ return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[m]; }) + "</span><button type=\"button\" class=\"todoDel\" data-i=\"" + i + "\" aria-label=\"" + delLabel + "\">" + delLabel + "</button>";
      list.appendChild(li);
      if(item.done) done++;
      li.querySelector('input[type=checkbox]').addEventListener("change", function(){ var t = loadTodos(); t[i].done = !!this.checked; saveTodos(t); renderTodos(); });
      li.querySelector(".todoDel").addEventListener("click", function(){ var t = loadTodos(); t.splice(i, 1); saveTodos(t); renderTodos(); });
    });
    var pct = todos.length ? Math.round((done / todos.length) * 100) : 0;
    if(fill) fill.style.width = pct + "%";
  }
  document.getElementById("todoAdd").addEventListener("click", function(){
    var input = document.getElementById("todoInput");
    var text = (input && input.value) ? input.value.trim() : "";
    if(!text) return;
    var todos = loadTodos();
    todos.push({ text: text, done: false });
    saveTodos(todos);
    if(input) input.value = "";
    renderTodos();
  });
  document.getElementById("todoInput").addEventListener("keydown", function(e){ if(e.key === "Enter") document.getElementById("todoAdd").click(); });

  var initLang = getLang();
  try { localStorage.setItem(LS_LANG, initLang); localStorage.setItem(LANG_KEY, initLang); } catch (e) {}
  document.documentElement.lang = initLang === "zh" ? "zh-Hans" : "en";
  document.getElementById("langEN").setAttribute("aria-pressed", initLang === "en");
  document.getElementById("langZH").setAttribute("aria-pressed", initLang === "zh");
  updatePlannerLang(initLang);
  renderEnergyCardFromResult();
  renderPuffyOutfit();
  renderTodos();
  renderProfile();
  renderRecos();
</script>
</body>
</html>

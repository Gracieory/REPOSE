<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#F5E6DC">
<title>REPOSE — Where Stillness Becomes Form</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FDF0E8;--off:#F5E6DC;--off2:#EDD4C4;
  --ink:#4A3830;--mid:#9A8070;--light:#C4A898;--rule:#E4D0C4;
  --gold:#B08870;--green:#A09080;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased;height:100%}
body{background:radial-gradient(ellipse at 50% 45%, #FDF6F0 0%, #F5E6DC 45%, #EDD4C8 100%);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;font-family:'DM Mono',monospace}

.hero{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:64px 28px 32px;position:relative;overflow:hidden}

.top-row{display:flex;justify-content:space-between;align-items:flex-start;animation:fadeUp .7s ease both}
.issue-tag{font-size:9px;letter-spacing:.2em;color:#8E9E8A;text-transform:uppercase;line-height:1.8}
.lang-toggle{font-size:9px;letter-spacing:.14em;color:#7A8E9A;text-transform:uppercase;cursor:pointer;border:none;border-bottom:1px solid var(--rule);padding:0 0 1px;background:transparent;font-family:inherit}

.headline-block{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 0 24px;animation:fadeUp .7s .1s ease both}
.eyebrow{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#8E9E8A;margin-bottom:14px}
.headline-en{font-size:11px;font-weight:300;letter-spacing:.14em;text-transform:uppercase;color:#7A8E9A;line-height:1.7;margin-bottom:20px}
.headline-en em{color:#7A8E9A;font-style:normal}
.headline-serif{font-family:'DM Serif Display',serif;font-style:italic;font-size:52px;line-height:1.0;letter-spacing:-.01em;color:#6B4840;margin-bottom:16px}
.headline-serif-lg{font-family:'DM Serif Display',serif;font-style:italic;font-size:48px;line-height:1.0;letter-spacing:-.01em;color:#6B4840}
.rule-line{width:100%;height:1px;background:var(--rule);margin:22px 0}
.sub-copy{font-size:11px;font-weight:300;letter-spacing:.06em;color:var(--mid);line-height:1.9}




.bottom-block{animation:fadeUp .7s .3s ease both;display:flex;flex-direction:column;align-items:center}
.btn-wechat{width:80%;padding:13px;border-radius:980px;border:none;background:#7A9AAA;color:white;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 20px rgba(122,154,170,.25)}
.btn-wechat:hover{background:#6A8A9A;transform:scale(1.01);box-shadow:0 6px 24px rgba(122,154,170,.35)}
.btn-wechat svg{width:18px;height:18px}
.divider-row{display:flex;align-items:center;gap:10px;margin:14px 0;width:80%}
.divider-row::before,.divider-row::after{content:'';flex:1;height:1px;background:var(--rule)}
.divider-row span{font-size:10px;color:var(--light);letter-spacing:.08em}
.btn-guest{width:80%;padding:11px;background:transparent;border:1px solid var(--rule);border-radius:980px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mid);cursor:pointer;transition:all .2s}
.btn-guest:hover{border-color:var(--ink);color:var(--ink);transform:scale(1.01)}
.privacy{text-align:center;margin-top:14px;font-size:9px;letter-spacing:.04em;color:var(--light);line-height:1.8}
.privacy a{color:var(--gold);text-decoration:none}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:rgba(245,230,220,.96);backdrop-filter:blur(20px);border-top:1px solid var(--rule);display:flex;align-items:center;justify-content:space-around;padding-bottom:env(safe-area-inset-bottom);z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;text-decoration:none;color:var(--light);transition:color .2s;padding:6px 12px}
.nav-item.active{color:var(--ink)}
.nav-item:hover{color:var(--ink)}
.nav-icon{width:22px;height:22px}
.nav-label{font-size:8px;letter-spacing:.1em;text-transform:uppercase}
.nav-spacer{height:68px}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="hero">
  <div class="top-row">
    <div class="issue-tag">NO. 001 — 2026<br>STYLE ADVISORY</div>
    <button type="button" class="lang-toggle" aria-label="切换语言">中 / EN</button>
  </div>

  <div class="headline-block">
    <div class="eyebrow">Where Stillness Becomes Form.</div>
    <div class="headline-en">SCENE &nbsp;·&nbsp; WEATHER &nbsp;·&nbsp; <em>MOOD</em></div>
    <div class="headline-serif">Welcome</div>
    <div class="headline-serif-lg">To REPOSE</div>
  </div>

  <div class="bottom-block">
    <button class="btn-wechat" onclick="enterRepose()">进入 REPOSE</button>
    <div class="privacy">继续即同意 <a href="#">用户协议</a> 与 <a href="#">隐私政策</a><br>所有数据仅存于本地设备</div>
  </div>

  <div class="nav-spacer"></div>
</div>

<nav class="bottom-nav">
  <a class="nav-item active" href="index.html">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    <span class="nav-label">首页</span>
  </a>
  <a class="nav-item" href="quiz.html">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
    <span class="nav-label">今日</span>
  </a>
  <a class="nav-item" href="outfit.html">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 2L8 6H5a1 1 0 00-1 1v12a1 1 0 001 1h14a1 1 0 001-1V7a1 1 0 00-1-1h-3L12 2z"/></svg>
    <span class="nav-label">推荐</span>
  </a>
  <a class="nav-item" href="wardrobe.html">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    <span class="nav-label">衣橱</span>
  </a>
  <a class="nav-item" href="body.html">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="5" r="2.5"/><path d="M8 10h8l-1 5H9L8 10z"/><path d="M9 15l-1 6M15 15l1 6"/></svg>
    <span class="nav-label">形象</span>
  </a>
</nav>

<script>
var lang = localStorage.getItem('repose.lang') || 'zh';

var i18n = {
  zh: {
    issue:    'NO. 001 — 2026<br>STYLE ADVISORY',
    eyebrow:  'Where Stillness Becomes Form.',
    headline: 'SCENE &nbsp;·&nbsp; WEATHER &nbsp;·&nbsp; <em>MOOD</em>',
    welcome:  'Welcome',
    torepose: 'To REPOSE',
    wechat:   '进入 REPOSE',
    guest:    '以访客身份进入',
    privacy:  '继续即同意 <a href="#">用户协议</a> 与 <a href="#">隐私政策</a><br>所有数据仅存于本地设备',
    or:       '或',
    nav:      ['首页','今日','推荐','衣橱','形象'],
    toggle:   '中 / EN',
  },
  en: {
    issue:    'NO. 001 — 2026<br>STYLE ADVISORY',
    eyebrow:  'Where Stillness Becomes Form.',
    headline: 'SCENE &nbsp;·&nbsp; WEATHER &nbsp;·&nbsp; <em>MOOD</em>',
    welcome:  'Welcome',
    torepose: 'To REPOSE',
    wechat:   'Enter REPOSE',
    guest:    'Continue as Guest',
    privacy:  'By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a><br>All data is stored locally on your device',
    or:       'or',
    nav:      ['Home','Today','Outfits','Wardrobe','Figure'],
    toggle:   'EN / 中',
  }
};

function applyLang(l) {
  var t = i18n[l];
  document.querySelector('.issue-tag').innerHTML               = t.issue;
  document.querySelector('.eyebrow').innerHTML                 = t.eyebrow;
  document.querySelector('.headline-en').innerHTML             = t.headline;
  document.querySelector('.headline-serif').textContent        = t.welcome;
  document.querySelector('.headline-serif-lg').textContent     = t.torepose;
  document.querySelector('.btn-wechat').textContent             = t.wechat;
  document.querySelector('.privacy').innerHTML                 = t.privacy;
  document.querySelector('.lang-toggle').textContent           = t.toggle;
  document.querySelectorAll('.nav-label').forEach(function(el,i){ el.textContent = t.nav[i]; });
  document.documentElement.lang = l;
}

function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('repose.lang', lang);
  applyLang(lang);
}

function enterRepose() {
  localStorage.setItem('repose.user', JSON.stringify({name: lang==='zh'?'用户':'User', loginAt:Date.now()}));
  window.location.href = 'quiz.html';
}

document.querySelector('.lang-toggle').addEventListener('click', toggleLang);
document.querySelector('.lang-toggle').addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); toggleLang(); } });
applyLang(lang);
</script>
</body>
</html>

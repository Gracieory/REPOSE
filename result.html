<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#fff8fb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="REPOSE" />
  <title>REPOSE — Your Energy Card</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    :root {
      --ink: #1f2230;
      --muted: rgba(31, 34, 48, 0.68);
      --faint: rgba(31, 34, 48, 0.52);
      --hair: rgba(31, 34, 48, 0.10);
      --bg0: #fff8fb;
      --bg1: #f6f2ff;
      --sheetA: rgba(255, 255, 255, 0.48);
      --sheetB: rgba(255, 255, 255, 0.26);
      --sheetTint1: rgba(255, 214, 232, 0.28);
      --sheetTint2: rgba(207, 195, 255, 0.22);
      --sheetTint3: rgba(191, 234, 255, 0.18);
      --shadow: 0 28px 64px rgba(31, 34, 48, 0.12);
      --radiusXL: 36px;
      --radiusL: 24px;
      --btnFrom: rgba(255, 214, 232, 0.85);
      --btnTo: rgba(230, 218, 255, 0.75);
      --btnInk: var(--ink);
      --focus: rgba(31, 34, 48, 0.12);
      --max: 880px;
      --content: 720px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Noto Sans CJK SC", system-ui, "Helvetica Neue", Arial;
      color: var(--ink);
      position: relative;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(1400px 900px at 12% 0%, rgba(255, 214, 232, 0.78), transparent 72%),
        radial-gradient(1300px 850px at 88% 6%, rgba(191, 234, 255, 0.58), transparent 70%),
        radial-gradient(1200px 900px at 70% 110%, rgba(201, 255, 233, 0.48), transparent 68%),
        radial-gradient(1300px 950px at 24% 110%, rgba(207, 195, 255, 0.48), transparent 70%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      background-size: 120% 120%;
      background-position: 0% 0%;
      animation: bgFlowResult 18s ease-in-out infinite;
    }
    @keyframes bgFlowResult {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 50% 50%; }
    }
    .stage {
      min-height: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 24px 36px;
    }
    .sheet {
      width: min(var(--max), 100%);
      min-height: auto;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(31, 34, 48, 0.08);
      background:
        radial-gradient(900px 520px at 15% 0%, var(--sheetTint1), transparent 58%),
        radial-gradient(860px 520px at 88% 8%, var(--sheetTint3), transparent 58%),
        radial-gradient(760px 520px at 78% 52%, var(--sheetTint2), transparent 58%),
        linear-gradient(180deg, var(--sheetA), var(--sheetB));
      box-shadow: var(--shadow);
      border-radius: var(--radiusXL);
      backdrop-filter: blur(26px) saturate(1.15);
      -webkit-backdrop-filter: blur(26px) saturate(1.15);
      overflow: hidden;
      position: relative;
    }
    .nav {
      padding: 18px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgba(31, 34, 48, 0.06);
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      flex: 0 0 auto;
    }
    .nav .left, .nav .right { display: flex; align-items: center; gap: 12px; min-width: 100px; }
    .nav .left { justify-content: flex-start; }
    .nav .right { justify-content: flex-end; }
    .navBtn {
      border: 0;
      background: transparent;
      color: var(--ink);
      font-size: 17px;
      padding: 8px 8px;
      cursor: pointer;
      border-radius: 12px;
      outline: none;
      user-select: none;
      font-family: inherit;
      text-decoration: none;
      opacity: 0.88;
    }
    .navBtn:hover { opacity: 1; }
    .navBtn:focus { box-shadow: 0 0 0 3px var(--focus); }
    .navCenter { display: flex; align-items: center; justify-content: center; flex: 1; min-width: 0; }
    .seg {
      display: flex;
      border: 1px solid rgba(31, 34, 48, 0.1);
      background: rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      padding: 4px;
      gap: 4px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .seg button {
      border: 0;
      background: transparent;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.16s ease;
      outline: none;
      user-select: none;
      white-space: nowrap;
      font-family: inherit;
    }
    .seg button[aria-pressed="true"] { background: var(--ink); color: #fff; }

    .content {
      flex: 1 1 auto;
      padding: 20px 20px 28px;
      display: flex;
      justify-content: center;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }
    .inner { width: min(var(--content), 100%); }

    .resultHero { margin-bottom: 16px; }
    .resultHero .title {
      font-size: clamp(20px, 2vw, 24px);
      font-weight: 700;
      letter-spacing: -0.04px;
      margin: 0 0 4px;
      line-height: 1.2;
    }
    .resultHero .sub { font-size: 15px; color: var(--muted); margin: 0; line-height: 1.4; }

    .card {
      border: 1px solid rgba(31, 34, 48, 0.07);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0.2));
      border-radius: var(--radiusL);
      overflow: hidden;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      margin-bottom: 14px;
    }
    .pad { padding: 18px 20px; }
    .sectionTitle {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2px;
      color: var(--muted);
      margin: 0 0 10px;
    }
    .pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(31, 34, 48, 0.1);
      background: rgba(255, 255, 255, 0.35);
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
    }
    .energyCard { padding: 0 20px 18px; }
    .energyCard .line {
      padding: 12px 0;
      border-top: 1px solid rgba(31, 34, 48, 0.06);
      display: block;
    }
    .energyCard .line:first-of-type { border-top: 0; padding-top: 0; }
    .energyCard .label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.18px;
      color: var(--muted);
      margin: 0 0 4px;
    }
    .energyCard .value {
      font-size: 15px;
      line-height: 1.45;
      color: var(--ink);
      margin: 0;
    }
    .energyCard .value.anchor { font-weight: 650; font-size: 16px; }
    .energyCard .tip {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
      margin: 12px 0 0;
      padding-top: 12px;
      border-top: 1px solid rgba(31, 34, 48, 0.06);
    }
    .energyCard .tip.shoeTip {
      margin-top: 6px;
      padding-top: 0;
      border-top: none;
      font-size: 12px;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; align-items: center; }
    .btn {
      border: 1px solid rgba(31, 34, 48, 0.12);
      background: rgba(255, 255, 255, 0.5);
      border-radius: 16px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.18s ease;
      font-family: inherit;
      display: inline-block;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .btn:hover { transform: translateY(-1px); border-color: rgba(31, 34, 48, 0.18); }
    .btn.primary {
      background: linear-gradient(180deg, var(--btnFrom), var(--btnTo));
      border-color: rgba(31, 34, 48, 0.08);
      box-shadow: 0 4px 20px rgba(207, 195, 255, 0.2);
    }
    .btn.primary:hover { opacity: 0.96; }
    .emptyState { text-align: center; padding: 48px 24px 40px; }
    .emptyState h2 { margin: 0 0 16px; font-size: clamp(22px, 2.2vw, 26px); font-weight: 700; letter-spacing: -0.04px; }
    .emptyState p { margin: 0 0 28px; font-size: 17px; color: var(--muted); line-height: 1.55; }
    .emptyState .btn.primary { padding: 17px 28px; font-size: 18px; }
    @media (min-width: 980px) {
      .stage { padding: 20px 24px 28px; }
      .nav { padding: 18px 22px 12px; }
      .content { padding: 24px 22px 28px; }
      .sheet { border-radius: 38px; }
      .pad { padding: 20px 22px; }
      .energyCard { padding: 0 22px 20px; }
    }

    /* Puffy mascot — card bottom-left, near planner button */
    .mascotWrapResult {
      position: absolute;
      left: 24px;
      bottom: 24px;
      width: 72px;
      height: 72px;
      z-index: 10;
      cursor: pointer;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
      color: inherit;
    }
    .mascotWrapResult:focus-visible { border-radius: 50%; box-shadow: 0 0 0 3px rgba(207, 195, 255, 0.4); }
    .mascotWrapResult svg {
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 4px 12px rgba(207, 195, 255, 0.25));
      pointer-events: none;
    }
    .mascotWrapResult svg { animation: puffyIdleResult 8s ease-in-out infinite; }
    @keyframes puffyIdleResult {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-3px) scale(1.01); }
    }
    .mascotBubbleResult {
      position: absolute;
      left: 50%;
      bottom: 100%;
      transform: translateX(-50%) translateY(-10px);
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.35;
      color: var(--ink);
      background: linear-gradient(135deg, rgba(255,252,254,0.28), rgba(248,242,255,0.22));
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 4px 20px rgba(200,180,220,0.06);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      white-space: normal;
      max-width: 260px;
      min-width: 140px;
      text-align: center;
      pointer-events: none;
      margin-bottom: 4px;
    }
    .mascotBubbleResult::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 100%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: rgba(248,242,255,0.45);
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="sheet" role="main" aria-label="Your Energy Card">
      <div class="nav">
        <div class="left">
          <a href="quiz.html" class="navBtn" id="backLink">Back</a>
        </div>
        <div class="navCenter">
          <div class="seg" role="group" aria-label="Language">
            <button type="button" id="langEN" aria-pressed="false">EN</button>
            <button type="button" id="langZH" aria-pressed="true">中文</button>
          </div>
        </div>
        <div class="right">
          <a href="index.html" class="navBtn" id="closeLink" aria-label="Close">Close</a>
        </div>
      </div>
      <div class="content">
        <div class="inner" id="mainContent"></div>
      </div>
      <a href="planner.html" class="mascotWrapResult" id="puffyWrap" aria-label="Puffy">
    <div class="mascotBubbleResult" id="puffyBubble" aria-live="polite"></div>
    <svg viewBox="0 0 100 90" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
      <defs>
        <linearGradient id="cloudGradResult" x1="50%" y1="0%" x2="50%" y2="100%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.94)" />
          <stop offset="50%" stop-color="rgba(255,250,254,0.82)" />
          <stop offset="100%" stop-color="rgba(248,240,255,0.68)" />
        </linearGradient>
        <linearGradient id="cloudEdgeResult" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.48)" />
          <stop offset="100%" stop-color="rgba(218,208,235,0.35)" />
        </linearGradient>
        <radialGradient id="cloudGlowResult" cx="50%" cy="35%" r="55%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.4)" />
          <stop offset="100%" stop-color="rgba(255,255,255,0)" />
        </radialGradient>
        <filter id="softEdgeResult" x="-15%" y="-15%" width="130%" height="130%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="0.35" result="blur" />
          <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
      </defs>
      <g filter="url(#softEdgeResult)" stroke-linejoin="round" stroke-linecap="round">
        <path d="M50 12 C74 12 88 26 88 40 C88 46 84 50 78 52 C82 54 86 60 86 66 C86 76 70 84 50 84 C30 84 14 76 14 66 C14 60 18 54 22 52 C16 50 12 46 12 40 C12 26 26 12 50 12 Z" fill="url(#cloudGradResult)" stroke="url(#cloudEdgeResult)" stroke-width="0.95" />
        <path d="M50 12 C74 12 88 26 88 40 C88 46 84 50 78 52 C82 54 86 60 86 66 C86 76 70 84 50 84 C30 84 14 76 14 66 C14 60 18 54 22 52 C16 50 12 46 12 40 C12 26 26 12 50 12 Z" fill="url(#cloudGlowResult)" opacity="0.5" />
        <circle cx="22" cy="52" r="7" fill="url(#cloudGradResult)" stroke="url(#cloudEdgeResult)" stroke-width="0.9" />
        <circle cx="78" cy="52" r="7" fill="url(#cloudGradResult)" stroke="url(#cloudEdgeResult)" stroke-width="0.9" />
        <path d="M50 6 Q54 2 58 6 Q56 10 52 9 Q50 8 50 6 Z" fill="url(#cloudGradResult)" stroke="url(#cloudEdgeResult)" stroke-width="0.6" opacity="0.98" />
      </g>
      <ellipse cx="36" cy="32" rx="3.8" ry="5" fill="rgba(40,36,62,0.88)" transform="rotate(-8 36 32)" />
      <circle cx="37" cy="30.8" r="1.2" fill="rgba(255,255,255,0.98)" />
      <ellipse cx="64" cy="32" rx="3.8" ry="5" fill="rgba(40,36,62,0.88)" transform="rotate(8 64 32)" />
      <circle cx="63" cy="30.8" r="1.2" fill="rgba(255,255,255,0.98)" />
      <ellipse cx="28" cy="36" rx="6" ry="3.5" fill="rgba(255,190,200,0.32)" />
      <ellipse cx="72" cy="36" rx="6" ry="3.5" fill="rgba(255,190,200,0.32)" />
      <path d="M44 41 Q50 49 56 41" stroke="rgba(55,48,68,0.6)" stroke-width="0.95" fill="none" stroke-linecap="round" />
    </svg>
      </a>
    </div>
  </div>

  <script>
  (function() {
    var QUIZ_KEY = 'repose.quiz.v1';
    var LANG_KEY = 'repose.lang';

    function getLang() {
      try {
        var v = localStorage.getItem('repose_lang') || localStorage.getItem(LANG_KEY);
        return v === 'en' ? 'en' : 'zh';
      } catch (e) { return 'zh'; }
    }
    function updateBackLink() {
      var el = document.getElementById('backLink');
      if (el) el.textContent = getLang() === 'en' ? 'Back' : '返回';
    }
    var PUFFY_BUBBLE = { zh: '点击生成去看看你的专属计划表吧', en: 'Tap the planner and see your table' };
    function updatePuffyBubble() {
      var el = document.getElementById('puffyBubble');
      if (el) el.textContent = PUFFY_BUBBLE[getLang()];
      var wrap = document.getElementById('puffyWrap');
      if (wrap) wrap.setAttribute('aria-label', getLang() === 'zh' ? '云朵小精灵' : 'Cloud spirit');
    }
    function setLang(lang) {
      try {
        localStorage.setItem(LANG_KEY, lang);
        localStorage.setItem('repose_lang', lang);
      } catch (e) {}
      document.documentElement.lang = lang === 'zh' ? 'zh-Hans' : 'en';
      var en = document.getElementById('langEN');
      var zh = document.getElementById('langZH');
      if (en) en.setAttribute('aria-pressed', lang === 'en');
      if (zh) zh.setAttribute('aria-pressed', lang === 'zh');
      updateBackLink();
      var closeEl = document.getElementById('closeLink');
      if (closeEl) closeEl.textContent = I18N[lang].close;
      updatePuffyBubble();
      render();
    }
    function updateHeaderSub() {}

    function normalizeMode(v) {
      if (!v) return null;
      var s = String(v).toLowerCase();
      if (s === 'calm' || v === 'Calm') return 'calm';
      if (s === 'focus' || v === 'Focus') return 'focus';
      if (s === 'confidence' || v === 'Confidence') return 'confidence';
      if (s === 'soft' || v === 'Soft') return 'soft';
      return s;
    }
    function normalizeScene(v) {
      if (!v) return null;
      var x = String(v);
      if (x === 'work' || x === 'Work/Campus') return 'work';
      if (x === 'Daily at home') return 'daily';
      if (x === 'Travel') return 'travel';
      if (x === 'social' || x === 'Social') return 'social';
      if (x === 'reset' || x === 'Solo reset') return 'reset';
      if (x === 'occasion' || x === 'Special occasion') return 'occasion';
      return x.toLowerCase();
    }
    function normalizeStyle(v) {
      if (!v) return null;
      var x = String(v);
      if (x === 'K-Style') return 'k';
      if (x === 'Local Trend') return 'local';
      if (x === 'Old Money') return 'oldmoney';
      if (x === 'Gentle & Graceful') return 'gentle';
      if (x === 'Cute') return 'cute';
      if (x === 'Clean') return 'clean';
      if (x === 'undetermined') return 'undetermined';
      return 'clean';
    }
    function normalizeTone(v) {
      if (!v) return 'light';
      var x = String(v);
      if (x === 'Dark tones' || x === 'dark') return 'dark';
      return 'light';
    }
    function normalizeZodiac(v) {
      if (!v) return null;
      var z = String(v).trim();
      var allowed = ['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
      if (allowed.indexOf(z) !== -1) return z;
      return null;
    }

    var INFER_STYLE = {
      confidence: { work: 'oldmoney', daily: 'clean', travel: 'local', social: 'local', occasion: 'oldmoney', reset: 'clean' },
      focus:      { work: 'clean', daily: 'clean', travel: 'clean', social: 'k', occasion: 'clean', reset: 'clean' },
      calm:       { work: 'gentle', daily: 'gentle', travel: 'gentle', social: 'gentle', occasion: 'gentle', reset: 'gentle' },
      soft:       { work: 'gentle', daily: 'gentle', travel: 'gentle', social: 'cute', occasion: 'gentle', reset: 'gentle' }
    };
    function inferStyle(quiz) {
      var mode = quiz.mode || 'calm';
      var scene = quiz.scene || 'work';
      var tone = quiz.tone || 'light';
      var byMode = INFER_STYLE[mode];
      var style = (byMode && byMode[scene]) ? byMode[scene] : 'clean';
      if (tone === 'dark' && (style === 'cute' || style === 'gentle')) style = style === 'cute' ? 'local' : 'clean';
      return style;
    }

    function readQuiz() {
      try {
        var raw = localStorage.getItem(QUIZ_KEY);
        if (!raw) return null;
        var data = JSON.parse(raw);
        if (!data || typeof data !== 'object') return null;
        return {
          mode: normalizeMode(data.mode) || 'calm',
          scene: normalizeScene(data.scene) || 'work',
          style: normalizeStyle(data.style),
          tone: normalizeTone(data.tone),
          zodiac: normalizeZodiac(data.zodiac),
          ts: data.ts
        };
      } catch (e) { return null; }
    }

    var I18N = {
      en: {
        back: 'Back', close: 'Close', headerSub: 'Your Energy Card',
        mode: { calm: 'Calm', focus: 'Focus', confidence: 'Confidence', soft: 'Soft' },
        scene: { work: 'Work/Campus', daily: 'Daily at home', travel: 'Travel', social: 'Social', reset: 'Solo reset', occasion: 'Special occasion' },
        style: { k: 'K-Style', local: 'Local Trend', oldmoney: 'Old Money', gentle: 'Gentle & Graceful', cute: 'Cute', clean: 'Clean' },
        tone: { light: 'Light tones', dark: 'Dark tones' },
        zodiac: { Aries: 'Aries', Taurus: 'Taurus', Gemini: 'Gemini', Cancer: 'Cancer', Leo: 'Leo', Virgo: 'Virgo', Libra: 'Libra', Scorpio: 'Scorpio', Sagittarius: 'Sagittarius', Capricorn: 'Capricorn', Aquarius: 'Aquarius', Pisces: 'Pisces' },
        labels: { pills: 'Your choices', crystal: 'Crystal', intentTags: 'Intent tags', outfit: 'Outfit formula', palette: 'Palette', anchor: 'Anchor', why: 'Why' },
        emptyTitle: 'No quiz data yet', emptyDesc: 'Complete the quiz to see your Energy Card.', emptyBtn: 'Start quiz',
        planner: 'Planner', retake: 'Retake quiz', home: 'Home', copy: 'Copy plan', recommendedStyle: 'Recommended'
      },
      zh: {
        back: '返回', close: '关闭', headerSub: '你的能量卡',
        mode: { calm: '平静', focus: '专注', confidence: '气场', soft: '温柔' },
        scene: { work: '上课上班', daily: '日常居家', travel: '旅游', social: '社交', reset: '独处充电', occasion: '特别场合' },
        style: { k: '韩系', local: '美式', oldmoney: '老钱', gentle: '清冷氛围', cute: '可爱', clean: '极简' },
        tone: { light: '浅色系', dark: '深色系' },

      var outfitCopy = [data.outfit.base, data.outfit.structure, data.outfit.bottom, data.outfit.shoes, data.outfit.accessory].filter(function (x) { return x && x !== '—'; }).join(' → ');
      var lines = ['1. ' + L.crystal + ': ' + data.crystal.name, '2. ' + L.intentTags + ': ' + data.crystal.tags.join(' · '), '3. ' + L.outfit + ': ' + outfitCopy, '4. ' + L.palette + ': ' + data.palette.colors + ' · ' + data.palette.material, '5. ' + L.anchor + ': ' + data.anchor, '6. ' + L.why + ': ' + data.why];
      var text = lines.join('\n');
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(function() { alert(getLang() === 'zh' ? '已复制到剪贴板' : 'Copied to clipboard'); }).catch(function() { var ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;opacity:0'; document.body.appendChild(ta); ta.select(); try { document.execCommand('copy'); alert(getLang() === 'zh' ? '已复制到剪贴板' : 'Copied to clipboard'); } catch (e) {} document.body.removeChild(ta); });
      else { var ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;opacity:0'; document.body.appendChild(ta); ta.select(); try { document.execCommand('copy'); alert(getLang() === 'zh' ? '已复制到剪贴板' : 'Copied to clipboard'); } catch (e) {} document.body.removeChild(ta); }
    }

    var lastData = null, lastLang = null;
    function render() {
      var lang = getLang(), quiz = readQuiz(), main = document.getElementById('mainContent');
      if (!main) return;
      if (!quiz) { main.innerHTML = renderEmpty(lang); lastData = null; return; }
      var data = computeResult(quiz, lang); lastData = data; lastLang = lang;
      try { localStorage.setItem('repose.result.v1', JSON.stringify({ data: data, lang: lang })); } catch (e) {}
      main.innerHTML = renderResult(data, lang);
      var copyBtn = document.getElementById('copyBtn');
      if (copyBtn) copyBtn.addEventListener('click', function() { if (lastData && lastLang) copyPlan(lastData, lastLang); });
    }

    document.getElementById('langEN').addEventListener('click', function() { setLang('en'); });
    document.getElementById('langZH').addEventListener('click', function() { setLang('zh'); });
    var lang = getLang();
    document.getElementById('langEN').setAttribute('aria-pressed', lang === 'en');
    document.getElementById('langZH').setAttribute('aria-pressed', lang === 'zh');
    updateBackLink();
    var closeEl = document.getElementById('closeLink');
    if (closeEl) closeEl.textContent = I18N[lang].close;
    updatePuffyBubble();
    render();
  })();
  </script>
</body>
</html>

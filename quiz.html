<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#fff8fb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="REPOSE" />
  <title>Repose · Quiz (Mood × Weather × Style)</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1f2230;
      --muted: rgba(31, 34, 48, 0.68);
      --faint: rgba(31, 34, 48, 0.52);
      --hair: rgba(31, 34, 48, 0.10);

      --bg0: #fff8fb;
      --bg1: #f6f2ff;
      --bg2: #e9fbff;
      --bg3: #f4e9ff;

      /* Glass sheet – quiz palette, no blue */
      --sheetA: rgba(255, 255, 255, 0.48);
      --sheetB: rgba(255, 255, 255, 0.26);
      --sheetTint1: rgba(255, 214, 232, 0.28);
      --sheetTint2: rgba(207, 195, 255, 0.22);
      --sheetTint3: rgba(191, 234, 255, 0.18);

      --shadow: 0 28px 64px rgba(31, 34, 48, 0.12);
      --radiusXL: 36px;
      --radiusL: 24px;

      
      
      /* Primary button: quiz gradient (no blue) */
      --btnFrom: rgba(255, 214, 232, 0.85);
      --btnTo: rgba(230, 218, 255, 0.75);
      --btnInk: var(--ink);
      --focus: rgba(31, 34, 48, 0.12);

      --max: 920px;
      --content: 760px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Noto Sans CJK SC", system-ui, "Helvetica Neue", Arial;
      color: var(--ink);
      background:
        radial-gradient(1200px 900px at 18% 10%, rgba(255, 214, 232, 0.5), transparent 58%),
        radial-gradient(1000px 800px at 82% 12%, rgba(201, 255, 233, 0.35), transparent 55%),
        radial-gradient(900px 700px at 75% 42%, rgba(191, 234, 255, 0.4), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    .stage {
      min-height: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 20px 48px;
    }

    .sheet {
      width: min(var(--max), 100%);
      min-height: 88vh;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(31, 34, 48, 0.08);
      background:
        radial-gradient(900px 520px at 15% 0%, var(--sheetTint1), transparent 58%),
        radial-gradient(860px 520px at 88% 8%, var(--sheetTint3), transparent 58%),
        radial-gradient(760px 520px at 78% 52%, var(--sheetTint2), transparent 58%),
        linear-gradient(180deg, var(--sheetA), var(--sheetB));
      box-shadow: var(--shadow);
      border-radius: var(--radiusXL);
      backdrop-filter: blur(26px) saturate(1.15);
      -webkit-backdrop-filter: blur(26px) saturate(1.15);
      overflow: hidden;
      position: relative;
    }

    .nav {
      padding: 18px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgba(31, 34, 48, 0.06);
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      flex: 0 0 auto;
    }
    .nav .left, .nav .right {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 100px;
    }
    .nav .left { justify-content: flex-start; }
    .nav .right { justify-content: flex-end; }
    .navBtn {
      border: 0;
      background: transparent;
      color: var(--ink);
      font-size: 17px;
      padding: 8px 8px;
      cursor: pointer;
      border-radius: 12px;
      outline: none;
      user-select: none;
      font-family: inherit;
      opacity: 0.88;
    }
    .navBtn:hover { opacity: 1; }
    .navBtn:focus { box-shadow: 0 0 0 3px var(--focus); }
    .navCenter {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      min-width: 0;
    }

    .seg {
      display: flex;
      border: 1px solid rgba(31, 34, 48, 0.1);
      background: rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      padding: 4px;
      gap: 4px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .seg button {
      border: 0;
      background: transparent;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.16s ease;
      outline: none;
      user-select: none;
      white-space: nowrap;
      font-family: inherit;
    }
    .seg button[aria-pressed="true"] {
      background: var(--ink);
      color: #fff;
    }

    .content {
      flex: 1 1 auto;
      padding: 32px 20px 120px;
      display: flex;
      justify-content: center;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }
    .inner { width: min(var(--content), 100%); }

    .mascotWrap {
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 12px 0 20px;
      cursor: pointer;
      position: relative;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .mascotWrap:focus-visible { border-radius: 50%; box-shadow: 0 0 0 3px rgba(207, 195, 255, 0.4); }
    .mascotWrap svg {
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 4px 12px rgba(207, 195, 255, 0.25));
      pointer-events: none;
    }
    .mascotWrap.tickle svg {
      animation: mascotTickle 0.45s ease;
    }
    @keyframes mascotTickle {
      0%, 100% { transform: scale(1); }
      20% { transform: scale(1.08) translateX(-3px); }
      40% { transform: scale(1.06) translateX(3px); }
      60% { transform: scale(1.08) translateX(-2px); }
      80% { transform: scale(1.04) translateX(2px); }
    }
    .mascotBubble {
      position: absolute;
      left: 100%;
      top: 50%;
      transform: translateY(-50%) translateX(-8px);
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.35;
      color: var(--ink);
      background: linear-gradient(135deg, rgba(255,252,254,0.72), rgba(248,242,255,0.58));
      border: 1px solid rgba(255,255,255,0.35);
      box-shadow: 0 4px 20px rgba(200,180,220,0.12);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      white-space: normal;
      max-width: 260px;
      min-width: 120px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease, visibility 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      margin-left: 6px;
    }
    .mascotBubble::after {
      content: '';
      position: absolute;
      right: 100%;
      top: 50%;
      transform: translateY(-50%);
      border: 6px solid transparent;
      border-right-color: rgba(248,242,255,0.75);
    }
    .mascotBubble.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(-50%) translateX(2px);
    }

    .title {
      margin: 0;
      font-size: clamp(32px, 4.2vw, 48px);
      line-height: 1.08;
      letter-spacing: -0.4px;
      font-weight: 650;
      font-family: "Cormorant Garamond", Georgia, serif;
    }
    .desc {
      margin: 16px 0 0;
      font-size: clamp(16px, 1.65vw, 19px);
      line-height: 1.58;
      color: var(--muted);
      max-width: 58ch;
    }

    .qH { margin-top: 12px; }
    .qKicker {
      font-size: 14px;
      color: var(--faint);
      margin: 0 0 10px;
      letter-spacing: 0.2px;
    }
    .qTitle {
      margin: 0;
      font-size: clamp(28px, 3.6vw, 42px);
      line-height: 1.08;
      letter-spacing: -0.35px;
      font-weight: 660;
      font-family: "Cormorant Garamond", Georgia, serif;
    }
    .qSub {
      margin: 14px 0 0;
      font-size: clamp(16px, 1.6vw, 19px);
      line-height: 1.55;
      color: var(--muted);
      max-width: 60ch;
    }

    .listCard {
      margin-top: 24px;
      border: 1px solid rgba(31, 34, 48, 0.07);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0.2));
      border-radius: var(--radiusL);
      overflow: hidden;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .listCard + .listCard { margin-top: 20px; }
    .listCardTitle {
      font-size: 15px;
      font-weight: 620;
      color: var(--ink);
      margin: 0 0 12px;
      padding: 0 4px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 18px;
      border-top: 1px solid rgba(31, 34, 48, 0.06);
      cursor: pointer;
      user-select: none;
      background: rgba(255, 255, 255, 0.04);
    }
    .row:first-child { border-top: 0; }
    .row:hover { background: rgba(255, 255, 255, 0.12); }
    .rowMain { min-width: 0; }
    .rowMain .t {
      font-size: 18px;
      font-weight: 620;
      letter-spacing: -0.06px;
      margin: 0;
    }
    .rowMain .d {
      margin: 6px 0 0;
      font-size: 14px;
      color: var(--faint);
      line-height: 1.45;
    }

    .radio {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 2px solid rgba(31, 34, 48, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .radio i {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: transparent;
      display: block;
    }
    .row[data-selected="true"] .radio {
      border-color: rgba(180, 140, 220, 0.9);
    }
    .row[data-selected="true"] .radio i {
      background: rgba(180, 140, 220, 0.9);
    }

    .bottom {
      flex: 0 0 auto;
      padding: 16px 20px 20px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.32));
      border-top: 1px solid rgba(31, 34, 48, 0.06);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      position: sticky;
      bottom: 0;
    }
    .primary {
      width: 100%;
      border: 0;
      background: linear-gradient(180deg, var(--btnFrom), var(--btnTo));
      color: var(--btnInk);
      border: 1px solid rgba(31, 34, 48, 0.08);
      border-radius: 20px;
      padding: 17px 20px;
      font-size: 18px;
      font-weight: 650;
      letter-spacing: -0.06px;
      cursor: pointer;
      outline: none;
      transition: transform 0.12s ease;
      font-family: inherit;
      box-shadow: 0 4px 20px rgba(207, 195, 255, 0.2);
    }
    .primary:hover { opacity: 0.96; }
    .primary:active { transform: scale(0.992); }
    .primary:focus { box-shadow: 0 0 0 3px rgba(207, 195, 255, 0.35); }
    .primary[disabled] { opacity: 0.4; cursor: not-allowed; transform: none; }

    @media (min-width: 980px) {
      .stage { padding: 28px 24px 56px; }
      .nav { padding: 20px 24px 14px; }
      .content { padding: 40px 24px 136px; }
      .sheet { border-radius: 38px; }
      .row { padding: 20px 20px; }
    }
  </style>
</head>

    document.documentElement.lang = lang === 'zh' ? 'zh-Hans' : 'en';

      style: state.style,
      tone: state.tone,
      zodiac: state.zodiacChoice === 'choose' ? (state.zodiac || '') : null,
      ts: new Date().toISOString()
    };
    try { localStorage.setItem(QUIZ_KEY, JSON.stringify(out)); } catch (e) {}
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
  }

  function currentKey() {
    if (state.step <= 0 || state.step > TOTAL) return null;
    return COPY[getLang()].steps[state.step - 1].key;
  }

  function canProceed() {
    if (state.step <= 0) return true;
    const key = currentKey();
    if (key === 'zodiacChoice') {
      if (state.zodiacChoice === 'skip') return true;
      if (state.zodiacChoice === 'choose') return !!state.zodiac;
      return false;
    }
    return !!state[key];
  }

  const root = document.getElementById('root');
  const primaryBtn = document.getElementById('primaryBtn');
  const backBtn = document.getElementById('backBtn');

  function renderIntro(lang) {
    const c = COPY[lang];
    return `
      <div class="mascotWrap" id="mascotWrap" role="button" tabindex="0" aria-label="${escapeHtml(c.mascot.ariaLabel)}">
      <div class="mascotBubble" id="mascotBubble" aria-live="polite"></div>
      <svg viewBox="0 0 100 90" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
        <defs>
          <linearGradient id="cloudGrad" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.94)" />
            <stop offset="50%" stop-color="rgba(255,250,254,0.82)" />
            <stop offset="100%" stop-color="rgba(248,240,255,0.68)" />
          </linearGradient>
          <linearGradient id="cloudEdge" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.48)" />
            <stop offset="100%" stop-color="rgba(218,208,235,0.35)" />
          </linearGradient>
          <radialGradient id="cloudGlow" cx="50%" cy="35%" r="55%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.4)" />
            <stop offset="100%" stop-color="rgba(255,255,255,0)" />
          </radialGradient>
          <filter id="softEdge" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="0.35" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
        <g filter="url(#softEdge)" stroke-linejoin="round" stroke-linecap="round">
          <!-- 一体轮廓：圆脸 + 收颈 + 短身体（头重脚轻）+ 圆底 -->
          <path d="M50 12
                   C 74 12 88 26 88 40
                   C 88 46 84 50 78 52
                   C 82 54 86 60 86 66
                   C 86 76 70 84 50 84
                   C 30 84 14 76 14 66
                   C 14 60 18 54 22 52
                   C 16 50 12 46 12 40
                   C 12 26 26 12 50 12 Z"
                fill="url(#cloudGrad)" stroke="url(#cloudEdge)" stroke-width="0.95" />
          <path d="M50 12
                   C 74 12 88 26 88 40
                   C 88 46 84 50 78 52
                   C 82 54 86 60 86 66
                   C 86 76 70 84 50 84
                   C 30 84 14 76 14 66
                   C 14 60 18 54 22 52
                   C 16 50 12 46 12 40
                   C 12 26 26 12 50 12 Z"
                fill="url(#cloudGlow)" opacity="0.5" />
          <!-- 手：短圆（身体缩短后略上移） -->
          <circle cx="22" cy="52" r="7" fill="url(#cloudGrad)" stroke="url(#cloudEdge)" stroke-width="0.9" />
          <circle cx="78" cy="52" r="7" fill="url(#cloudGrad)" stroke="url(#cloudEdge)" stroke-width="0.9" />
          <!-- 头顶小卷毛 -->
          <path d="M50 6 Q54 2 58 6 Q56 10 52 9 Q50 8 50 6 Z" fill="url(#cloudGrad)" stroke="url(#cloudEdge)" stroke-width="0.6" opacity="0.98" />
        </g>
        <!-- 杏仁眼 -->
        <ellipse cx="36" cy="32" rx="3.8" ry="5" fill="rgba(40,36,62,0.88)" transform="rotate(-8 36 32)" />
        <circle cx="37" cy="30.8" r="1.2" fill="rgba(255,255,255,0.98)" />
        <ellipse cx="64" cy="32" rx="3.8" ry="5" fill="rgba(40,36,62,0.88)" transform="rotate(8 64 32)" />
        <circle cx="63" cy="30.8" r="1.2" fill="rgba(255,255,255,0.98)" />
        <!-- 腮红：自然晕染，不是线 -->
        <ellipse cx="28" cy="36" rx="6" ry="3.5" fill="rgba(255,190,200,0.32)" />
        <ellipse cx="72" cy="36" rx="6" ry="3.5" fill="rgba(255,190,200,0.32)" />
        <!-- 嘴巴：弧度向下（再往下一点） -->
        <path d="M44 41 Q50 49 56 41" stroke="rgba(55,48,68,0.6)" stroke-width="0.95" fill="none" stroke-linecap="round" />
      </svg>
    </div>
      <h1 class="title">${escapeHtml(c.intro.title)}</h1>
      <p class="desc">${escapeHtml(c.intro.desc)}</p>
    `;
  }

  function renderStep(lang) {
    const c = COPY[lang];
    const s = c.steps[state.step - 1];
    const key = s.key;

    if (key === 'zodiacChoice') {
      const opts = c.options.zodiacChoice;
      const selected = state.zodiacChoice;
      let html = `
        <div class="qH">
          <p class="qKicker">${escapeHtml(c.step(state.step, TOTAL))}</p>
          <h2 class="qTitle">${escapeHtml(s.title)}</h2>
          <p class="qSub">${escapeHtml(s.sub)}</p>
        </div>
        <div class="listCard" role="list">
          ${opts.map(o => {
            const hasDesc = typeof o.d === 'string' && o.d.trim().length > 0;
            return `
            <div class="row" role="listitem" tabindex="0"
                 data-key="zodiacChoice" data-value="${escapeHtml(o.v)}"
                 data-selected="${selected === o.v ? 'true' : 'false'}">
              <div class="rowMain">
                <p class="t">${escapeHtml(o.t)}</p>
                ${hasDesc ? `<p class="d">${escapeHtml(o.d)}</p>` : ''}
              </div>
              <div class="radio" aria-hidden="true"><i></i></div>
            </div>
          `}).join('')}
        </div>
      `;
      if (state.zodiacChoice === 'choose') {
        html += '<div class="listCard" role="list">';
        ZODIAC_VALUES.forEach((v, i) => {
          const label = c.zodiac[i];
          html += `
            <div class="row" role="listitem" tabindex="0"
                 data-key="zodiac" data-value="${escapeHtml(v)}"
                 data-selected="${state.zodiac === v ? 'true' : 'false'}">
              <div class="rowMain"><p class="t">${escapeHtml(label)}</p></div>
              <div class="radio" aria-hidden="true"><i></i></div>
            </div>
          `;
        });
        html += '</div>';
      }
      return html;
    }

    const opts = c.options[key];
    const selected = state[key];
    return `
      <div class="qH">
        <p class="qKicker">${escapeHtml(c.step(state.step, TOTAL))}</p>
        <h2 class="qTitle">${escapeHtml(s.title)}</h2>
        <p class="qSub">${escapeHtml(s.sub)}</p>
      </div>
      <div class="listCard" role="list">
        ${opts.map(o => {
          const hasDesc = typeof o.d === 'string' && o.d.trim().length > 0;
          return `
          <div class="row" role="listitem" tabindex="0"
               data-key="${escapeHtml(key)}" data-value="${escapeHtml(o.v)}"
               data-selected="${selected === o.v ? 'true' : 'false'}">
            <div class="rowMain">
              <p class="t">${escapeHtml(o.t)}</p>
              ${hasDesc ? `<p class="d">${escapeHtml(o.d)}</p>` : ''}
            </div>
            <div class="radio" aria-hidden="true"><i></i></div>
          </div>
        `}).join('')}
      </div>
    `;
  }

  function render() {
    const lang = getLang();
    const c = COPY[lang];

    backBtn.textContent = c.navBack;
    backBtn.style.visibility = state.step === 0 ? 'hidden' : 'visible';

    root.innerHTML = state.step === 0 ? renderIntro(lang) : renderStep(lang);

    if (state.step === 0) {
      primaryBtn.textContent = c.begin;
      primaryBtn.disabled = false;
    } else {
      primaryBtn.textContent = state.step === TOTAL ? c.done : c.next;
      primaryBtn.disabled = !canProceed();
    }

    bindRows();
    if (state.step === 0) {
      bindMascot();
      primaryBtn.focus();
    }
    save();
  }

  let mascotClickCount = 0;
  function bindMascot() {
    const wrap = document.getElementById('mascotWrap');
    const bubble = document.getElementById('mascotBubble');
    if (!wrap || !bubble) return;
    const lang = getLang();
    const m = COPY[lang].mascot;
    const messages = [m.tickle, m.greet, m.intro];
    wrap.onclick = function () {
      wrap.classList.add('tickle');
      bubble.textContent = messages[mascotClickCount % 3];
      mascotClickCount += 1;
      bubble.classList.add('show');
      setTimeout(function () { wrap.classList.remove('tickle'); }, 450);
      setTimeout(function () { bubble.classList.remove('show'); }, 2200);
    };
    wrap.onkeydown = function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); wrap.click(); }
    };
  }

  function bindRows() {
    root.querySelectorAll('.row').forEach(r => {
      r.addEventListener('click', () => selectRow(r));
      r.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectRow(r); }
      });
    });
  }

  function selectRow(row) {
    const key = row.getAttribute('data-key');
    const val = row.getAttribute('data-value');
    if (key === 'zodiacChoice') {
      state.zodiacChoice = val;
      if (val === 'skip') state.zodiac = null;
    } else if (key === 'zodiac') {
      state.zodiac = val;
    } else {
      state[key] = val;
    }
    render();
    primaryBtn.focus();
  }

  function next() {
    if (state.step === 0) {
      state.step = 1;
      render();
      return;
    }
    if (state.step < TOTAL) {
      state.step += 1;
      render();
    } else {
      save();
      window.location.href = 'result.html';
    }
  }

  function back() {
    if (state.step > 1) state.step -= 1;
    else state.step = 0;
    render();
  }

  primaryBtn.addEventListener('click', next);
  backBtn.addEventListener('click', back);
  primaryBtn.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      next();
    }
  });

  document.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter') return;
    if (e.target.closest('.seg')) return;
    if (state.step === 0) {
      e.preventDefault();
      next();
      return;
    }
    if (state.step > 0 && canProceed() && !(document.activeElement && document.activeElement.closest('.row'))) {
      e.preventDefault();
      next();
    }
  });

  document.getElementById('langEN').addEventListener('click', () => setLang('en'));
  document.getElementById('langZH').addEventListener('click', () => setLang('zh'));

  (function init() {
    const lang = getLang();
    try {
      localStorage.setItem(LS_LANG, lang);
      localStorage.setItem(LS_LANG_ALT, lang);
    } catch (e) {}
    document.documentElement.lang = lang === 'zh' ? 'zh-Hans' : 'en';
    document.getElementById('langEN').setAttribute('aria-pressed', lang === 'en');
    document.getElementById('langZH').setAttribute('aria-pressed', lang === 'zh');
    load();
    if (typeof state.step !== 'number' || state.step < 0 || state.step > TOTAL) state.step = 0;
    render();
    primaryBtn.focus();
  })();
  </script>
</body>
</html>
